name: Retrive aws secrets manger

on: 
  push: 
    branches: [main]

jobs:
  get-secrets:
        runs-on: ubuntu-latest
        steps:
          - name: checkout code
            uses: actions/checkout@v3

          - name:  Configure AWS credentials
            uses: aws-actions/configure-aus-credentials@v2
            with:
                  aws-access-key-id: ${{ secrets.AMS_ACCESS_KEY_ID }}
                  aws-secret-access-key: $(( secrets.AMS SECRET_ACCESS_KEY ))
                  aws-region: $((secrets.ANS_REGION })

          - name: Retrieve secret
            id: get_secret
            run: |
               SECRET-$(aus secretsmanager get-secret-value-secret-id myapp/db-credentials --query SecretString-cutput text)
                echo "Secret: $SECRET"

