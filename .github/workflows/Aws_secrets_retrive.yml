name: Retrieve Secret from AWS Secrets Manager (OIDC)

on:
  push:
    branches: [ main ]

jobs:
  get-secret:
    runs-on: ubuntu-latest

    
    permissions:
      id-token: write   # REQUIRED for OIDC
      contents: read



    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::647431120032:role/git_ci_role_secrets
          aws-region: us-east-1

      - name: Verify identity
        run: aws sts get-caller-identity

      - name: Retrieve AWS Secret
        id: cfg
        run: |

            RAW=$(aws secretsmanager get-secret-value \
            --secret-id mango/uat/mangouatsecrets \
            --query SecretString --output text)
            echo "$RAW" | jq -r 'to_entries | .[] | "\(.key)=\(.value)"' >> "$GITHUB_OUTPUT"

      - name: Use outputs safely
        run: |
           echo "username length: ${#${{ steps.cfg.outputs.DbPassword }}}"
           echo "password length: ${#${{ steps.cfg.outputs.DbUser }}}"


